# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: us-deploy
  labels:
    app: us-dpm
# 所有这些修改都只需要重新apply：
spec:
  selector:
    matchLabels:
      app: us-pod
  replicas: 1                    # ✓ 副本数
  template:
    metadata:
      labels:
        app: us-pod
    spec:
      imagePullSecrets:           # ← 添加这行
      - name: ecr-secret          # ← 添加这行
      containers:
      - name: us
        image: user-server:latest      # ✓ 镜像版本
        imagePullPolicy: IfNotPresent  # 关键！
        # resources:               # ✓ 资源限制
        #   limits:
        #     memory: "256Mi"
        # env:                     # ✓ 环境变量
        # - name: DEBUG
        #   value: "true"
        ports:                   # ✓ 端口
        - containerPort: 8000
        # livenessProbe:           # ✓ 健康检查
        #   httpGet:
        #     path: /health
        #     port: 8000
        # 挂载配置文件
        volumeMounts:
        - name: us-config-volume
          mountPath: /app/config/config.conf      # 明确文件路径
          subPath: config.conf  # 根据你的实际目录修改
          readOnly: true
        # 挂载secret
        - name: us-config-secret-volume
          mountPath: /app/config/config-secret.conf  # 作为单独文件
          subPath: config-secret.conf 
          readOnly: true
      volumes:
      - name: us-config-volume
        configMap:
          name: us-config
          items:
          - key: config.conf
            path: config.conf
      - name: us-config-secret-volume
        secret:
          secretName: us-config-secret
          optional: false
          defaultMode: 0400  # 只读权限
          items:
          - key: config-secret.conf
            path: config-secret.conf

